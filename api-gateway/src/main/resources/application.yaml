server:
  port: 8085
spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:http://localhost:8888




  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/school
  cloud:
    gateway:
      routes:
        - id: student-service
          uri: http://localhost:8500
          predicates:
            - Path=/students/**
          filters:
            - StripPrefix=1

        - id: course-service
          uri: http://localhost:8600
          predicates:
            - Path=/course-service/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
