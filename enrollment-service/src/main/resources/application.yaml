server:
  port: 8700

spring:
  application:
    name: enrollment-service

  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5433/enrollment_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/school

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# URLs des autres services
student-service:
  url: http://localhost:8500

course-service:
  url: http://localhost:8600

# Configuration Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
